<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DownieClip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 13px;
  }
  .container { padding: 16px; }
  .header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid #2a2a4e;
  }
  .logo { font-size: 24px; }
  .title { font-size: 15px; font-weight: 700; color: #6366f1; }
  .subtitle { font-size: 10px; color: #64748b; }

  .url-display {
    background: #0f172a; border-radius: 6px; padding: 8px 10px;
    font-size: 11px; color: #94a3b8; word-break: break-all;
    margin-bottom: 12px; max-height: 40px; overflow: hidden;
    line-height: 1.4;
  }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: #6366f1; color: #fff; margin-bottom: 8px;
  }
  .btn-primary:hover { background: #5558e6; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: #1e293b; color: #94a3b8; font-size: 11px;
  }
  .btn-secondary:hover { background: #334155; }

  .status {
    margin-top: 10px; padding: 8px; border-radius: 6px;
    font-size: 11px; text-align: center; display: none;
  }
  .status.success { background: #22c55e22; color: #22c55e; display: block; }
  .status.error { background: #ef444422; color: #ef4444; display: block; }
  .status.info { background: #6366f122; color: #6366f1; display: block; }

  .format-row {
    display: flex; gap: 6px; margin-bottom: 12px; align-items: center;
  }
  .format-row label { font-size: 11px; color: #94a3b8; white-space: nowrap; }
  .format-select {
    flex: 1; padding: 4px 6px; border-radius: 4px; border: 1px solid #334155;
    background: #0f172a; color: #e0e0e0; font-size: 11px;
  }

  .history-item {
    font-size: 10px; padding: 4px 0; color: #64748b;
    border-bottom: 1px solid #1e293b;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="logo">🎬</span>
    <div>
      <div class="title">DownieClip</div>
      <div class="subtitle">视频下载助手</div>
    </div>
  </div>

  <div class="url-display" id="urlDisplay">加载中...</div>

  <button class="btn btn-primary" id="btnDownload">
    ⬇ 发送到 DownieClip
  </button>

  <button class="btn btn-secondary" id="btnQueue">
    📋 仅复制 URL
  </button>

  <div class="status" id="status"></div>

  <div style="margin-top:12px; padding-top:10px; border-top:1px solid #2a2a4e">
    <div style="font-size:10px; color:#64748b; margin-bottom:6px;">最近记录</div>
    <div id="recentList"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
